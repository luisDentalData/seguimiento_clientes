[pytest]
# El código vive en src/ (se renombrará a backend/ en Change 3).
# pythonpath = . permite "from src.services.matching import Matcher"
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    characterization: tests que fijan el comportamiento ACTUAL antes de refactorizar
