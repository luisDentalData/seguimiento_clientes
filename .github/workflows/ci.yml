name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────
  #  CI — corre en todos los pushes y PRs
  # ─────────────────────────────────────────────
  backend:
    name: Backend (pytest + Postgres real)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dentaldata
          POSTGRES_DB: dentaldata
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+pg8000://postgres:dentaldata@localhost:5432/dentaldata_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests (Postgres real)
        run: python -m pytest -q

  frontend:
    name: Frontend (type-check + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  #  CD — solo en merge/push a main
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # El backend incluye alembic upgrade head en entrypoint.sh —
      # las migraciones se aplican automáticamente al arrancar el container.
      - name: Deploy backend
        run: |
          gcloud run deploy dentaldata-backend \
            --source . \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-cloudsql-instances=seguimientoclientes-483013:europe-southwest1:dentaldata-db \
            --set-secrets="DATABASE_URL=dentaldata-db-url:latest,/secrets/credentials.json=google-credentials:latest,/token/token.pickle=google-oauth-token:latest" \
            --env-vars-file=.env.yaml \
            --memory=512Mi \
            --cpu=1 \
            --timeout=600 \
            --max-instances=10 \
            --min-instances=0 \
            --no-use-http2 \
            --quiet

      - name: Deploy frontend
        working-directory: dashboard
        run: |
          gcloud run deploy dentaldata-frontend \
            --source . \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --max-instances=5 \
            --min-instances=0 \
            --no-use-http2 \
            --quiet
